name: Build and deploy ASP.Net Core app to Azure Web App - wms-api-aman

on:
  push:
    branches:
      - main
    paths:
      - 'Backend/WMS.Api/**'
      - 'Backend/WMS.Application/**'
      - 'Backend/WMS.Domain/**'
      - 'Backend/WMS.Infrastructure/**'
      - '.github/workflows/main_wms-api-aman.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build with dotnet
        run: dotnet build WMS.Api/WMS.Api.csproj --configuration Release

      - name: dotnet publish
        run: dotnet publish WMS.Api/WMS.Api.csproj -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'wms-api-aman'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_17230111E07847F5951710CA87124D7D }}
